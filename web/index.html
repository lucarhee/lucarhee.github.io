<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Personal portfolio and blog">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="My Blog">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OG tags -->
  <meta property="og:title" content="My Portfolio & Blog">
  <meta property="og:description" content="Personal portfolio and blog built with Flutter Web">
  <meta property="og:type" content="website">

  <title>My Portfolio & Blog</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #0f0f23;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
    }

    .loader-circle {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(139, 92, 246, 0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      color: rgba(255,255,255,0.6);
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 16px;
      letter-spacing: 2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-circle"></div>
    <p class="loader-text">LOADING</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
